services:
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    environment:
      HTTP_ADDR: :8080
      GAME_GRPC_ADDR: game:50051
      LOBBY_GRPC_ADDR: lobby-primary:50052
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: voxel-gateway
    ports:
      - "8080:8080"
    depends_on:
      game:
        condition: service_healthy
      lobby-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/frontend-healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  game:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    environment:
      GRPC_ADDR: :50051
      HEALTH_ADDR: :8082
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: voxel-game
    expose:
      - "50051"
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8082/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  lobby-backup:
    build:
      context: ..
      dockerfile: services/lobby/Dockerfile
    environment:
      GRPC_ADDR: :50052
      HEALTH_ADDR: :8081
      GAME_GRPC_ADDR: game:50051
      LOBBY_REPLICATION_ROLE: backup
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: voxel-lobby-backup
    depends_on:
      game:
        condition: service_healthy
    expose:
      - "50052"
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  lobby-primary:
    build:
      context: ..
      dockerfile: services/lobby/Dockerfile
    environment:
      GRPC_ADDR: :50052
      HEALTH_ADDR: :8081
      GAME_GRPC_ADDR: game:50051
      LOBBY_REPLICATION_ROLE: primary
      LOBBY_REPLICA_URL: http://lobby-backup:8081/replication/lobby-state
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: voxel-lobby-primary
    depends_on:
      game:
        condition: service_healthy
      lobby-backup:
        condition: service_healthy
    expose:
      - "50052"
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_healthy
      game:
        condition: service_healthy
      lobby-primary:
        condition: service_healthy
      lobby-backup:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"
