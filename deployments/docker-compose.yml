services:
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    environment:
      HTTP_ADDR: :8080
      GAME_GRPC_ADDR: game:50051
      LOBBY_GRPC_ADDR: lobby:50052
    ports:
      - "8080:8080"
    depends_on:
      game:
        condition: service_healthy
      lobby:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  game:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    environment:
      GRPC_ADDR: :50051
      HEALTH_ADDR: :8082
    expose:
      - "50051"
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8082/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  lobby:
    build:
      context: ..
      dockerfile: services/lobby/Dockerfile
    environment:
      GRPC_ADDR: :50052
      HEALTH_ADDR: :8081
      GAME_GRPC_ADDR: game:50051
    depends_on:
      game:
        condition: service_healthy
    expose:
      - "50052"
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
