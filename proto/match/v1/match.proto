syntax = "proto3";

package match;

option go_package = "voxel-royale/gen/match";

import "google/api/annotations.proto";

service GameService {
  rpc StreamMatch(PlayerInput) returns (GameState) {
    option (google.api.http) = {
      post: "/v1/match/stream"
      body: "*"
    };
  }

  // StartMatch e chamado internamente pelo Lobby (gRPC service-to-service) para
  // criar/recriar uma partida vinculada a uma sala. Sem anotacao HTTP: nao e
  // exposto pelo Gateway.
  rpc StartMatch(StartMatchRequest) returns (StartMatchResponse);

  // Pipeline de tempo real (Fase 4). O Gateway mantem um WebSocket por jogador
  // e traduz a sessao para estas RPCs gRPC internas (sem anotacao HTTP):
  //  - PushInput: encaminha cada input do cliente para o buffer da partida.
  //  - WatchMatch: assina os snapshots que o relogio do servidor publica e que
  //    o Gateway distribui ("fan-out") aos clientes conectados.
  rpc PushInput(PlayerInput) returns (InputAck);
  rpc WatchMatch(WatchMatchRequest) returns (stream GameState);
}

message PlayerInput {
  string player_id = 1;
  float move_x = 2;
  float move_y = 3;
  bool is_attacking = 4;
  int64 input_sequence = 5;
  bool open_chest = 6;
  string target_player_id = 7;
  float aim_x = 8;
  float aim_y = 9;
  // room_id roteia o input para a partida da sala. Vazio usa a partida global
  // (compatibilidade com o modo demo de um jogador).
  string room_id = 10;
}

message MatchPlayer {
  string player_id = 1;
  string player_name = 2;
}

message StartMatchRequest {
  string room_id = 1;
  repeated MatchPlayer players = 2;
  int32 max_players = 3;
}

message StartMatchResponse {
  string match_id = 1;
  bool started = 2;
}

// InputAck confirma o recebimento de um input no pipeline de tempo real.
// applied_sequence ecoa o input_sequence aceito para apoiar a reconciliacao.
message InputAck {
  bool accepted = 1;
  int64 applied_sequence = 2;
}

// WatchMatchRequest assina o stream de snapshots de uma sala. player_id permite
// que o jogador apareca na partida assim que abre o WebSocket, mesmo antes do
// primeiro input.
message WatchMatchRequest {
  string room_id = 1;
  string player_id = 2;
}

message GameState {
  int64 tick = 1;
  repeated PlayerSnapshot players = 2;
  repeated ChestSnapshot chests = 3;
  SafeZoneSnapshot safe_zone = 4;
  repeated RankingEntry ranking = 5;
  bool match_ended = 6;
  int64 remaining_ticks = 7;
}

message PlayerSnapshot {
  string player_id = 1;
  float x = 2;
  float y = 3;
  bool is_alive = 4;
  int32 health = 5;
  string weapon = 6;
  int32 eliminations = 7;
  int32 damage_dealt = 8;
  int32 damage_taken = 9;
  int64 survived_ticks = 10;
}

message ChestSnapshot {
  string chest_id = 1;
  float x = 2;
  float y = 3;
  bool is_opened = 4;
  string weapon = 5;
  string opened_by_player_id = 6;
}

message SafeZoneSnapshot {
  float center_x = 1;
  float center_y = 2;
  float radius = 3;
  int64 phase = 4;
}

message RankingEntry {
  string player_id = 1;
  int32 place = 2;
  bool is_alive = 3;
  int32 health = 4;
  int32 eliminations = 5;
  int32 damage_dealt = 6;
  int64 survived_ticks = 7;
}
